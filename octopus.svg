<defs>
  <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eef0f3"/>
  </linearGradient>
  <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fbfcfd"/><stop offset="1" stop-color="#c6ccd6"/>
  </linearGradient>
  <radialGradient id="belly" cx="0.5" cy="0.42" r="0.6">
    <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0b0e14" flood-opacity="0.16"/>
  </filter>
  <style>
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}
    @keyframes sway1{0%,100%{transform:rotate(0deg)}50%{transform:rotate(2.6deg)}}
    @keyframes sway2{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-2.6deg)}}
    @keyframes cursor{0%,49%{opacity:1}50%,100%{opacity:0}}
    .oct{animation:floaty 6s ease-in-out infinite;transform-origin:center}
    .ten{fill:url(#skin);stroke:#14171d;stroke-width:2.4;stroke-linejoin:round;
          transform-box:fill-box;transform-origin:50% 4%}
    .cup{fill:#ffffff;stroke:#14171d;stroke-width:1.3}
    .tr0,.tl1{animation:sway1 4.2s ease-in-out infinite}
    .tl0,.tr1{animation:sway2 4.6s ease-in-out infinite}
    .tr2,.tl3{animation:sway1 3.8s ease-in-out infinite .3s}
    .tl2,.tr3{animation:sway2 4.0s ease-in-out infinite .5s}
    .lid{transform-box:fill-box;transform-origin:center;animation:blink 6s ease-in-out infinite}
    .cur{animation:cursor 1.1s steps(1) infinite}
  </style>
</defs>

