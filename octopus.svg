<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b18"/>
      <stop offset="0.55" stop-color="#0b1230"/>
      <stop offset="1" stop-color="#0a0f22"/>
    </linearGradient>
    <radialGradient id="glowC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowV" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="tent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <style>
      @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(0.1)}}
      @keyframes wig1{0%,100%{transform:rotate(0deg)}50%{transform:rotate(7deg)}}
      @keyframes wig2{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-8deg)}}
      @keyframes wig3{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(6deg)}}
      @keyframes type{0%,100%{opacity:.25}50%{opacity:1}}
      @keyframes rise{0%{opacity:0;transform:translateY(14px)}30%{opacity:1}100%{opacity:0;transform:translateY(-26px)}}
      @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
      .oct{animation:floaty 5s ease-in-out infinite;transform-origin:center}
      .lid{animation:blink 5.5s ease-in-out infinite;transform-origin:center;transform-box:fill-box}
      .t1{animation:wig1 3.2s ease-in-out infinite;transform-origin:top center;transform-box:fill-box}
      .t2{animation:wig2 3.8s ease-in-out infinite;transform-origin:top center;transform-box:fill-box}
      .t3{animation:wig3 4.2s ease-in-out infinite;transform-origin:top center;transform-box:fill-box}
      .t4{animation:wig2 3.5s ease-in-out infinite;transform-origin:top center;transform-box:fill-box}
      .cur{animation:type 1s steps(1) infinite}
      .p{animation:rise 3.4s ease-in-out infinite}
      .p2{animation:rise 4.1s ease-in-out infinite 1.2s}
      .p3{animation:rise 3.8s ease-in-out infinite 2s}
      .pulse{animation:pulse 2.4s ease-in-out infinite}
    </style>
  </defs>

  <rect width="1200" height="340" rx="22" fill="url(#bg)"/>
  <!-- dot grid -->
  <g fill="#1b2a55" opacity="0.5">
    <g id="row"></g>
  </g>
  <rect width="1200" height="340" rx="22" fill="none" stroke="#1e2a52" stroke-width="1.5"/>
  <ellipse cx="250" cy="150" rx="300" ry="220" fill="url(#glowC)"/>
  <ellipse cx="980" cy="230" rx="320" ry="220" fill="url(#glowV)"/>

  <!-- decorative dot matrix -->
  <g fill="#22d3ee" opacity="0.14">
    <g>
      <circle cx="60" cy="40" r="2"/><circle cx="100" cy="40" r="2"/><circle cx="140" cy="40" r="2"/>
      <circle cx="60" cy="300" r="2"/><circle cx="100" cy="300" r="2"/><circle cx="1140" cy="60" r="2"/>
      <circle cx="1100" cy="60" r="2"/><circle cx="1140" cy="100" r="2"/><circle cx="1140" cy="300" r="2"/>
    </g>
  </g>

  <!-- OCTOPUS -->
  <g class="oct">
    <!-- tentacles -->
    <g>
      <path class="t1" d="M320 250 q-40 40 -20 78 q10 20 -8 30" fill="none" stroke="url(#tent)" stroke-width="16" stroke-linecap="round"/>
      <path class="t2" d="M350 262 q-14 46 12 74 q16 18 2 34" fill="none" stroke="url(#tent)" stroke-width="16" stroke-linecap="round"/>
      <path class="t3" d="M392 268 q6 48 40 62 q22 10 14 30" fill="none" stroke="url(#tent)" stroke-width="16" stroke-linecap="round"/>
      <path class="t4" d="M440 262 q40 34 78 26" fill="none" stroke="url(#tent)" stroke-width="15" stroke-linecap="round"/>
      <path class="t1" d="M300 232 q-58 6 -84 40" fill="none" stroke="url(#tent)" stroke-width="15" stroke-linecap="round"/>
    </g>
    <!-- head -->
    <path d="M300 190 q0 -120 130 -120 q130 0 130 120 q0 70 -40 96 q-90 30 -180 0 q-40 -26 -40 -96 Z" fill="url(#body)"/>
    <path d="M300 190 q0 -120 130 -120 q130 0 130 120 q0 70 -40 96 q-90 30 -180 0 q-40 -26 -40 -96 Z" fill="none" stroke="#a5f3fc" stroke-opacity="0.35" stroke-width="2"/>
    <!-- headphones vibe / rim light -->
    <path d="M312 120 q118 -70 236 0" fill="none" stroke="#e0f7ff" stroke-opacity="0.4" stroke-width="3"/>
    <!-- eyes -->
    <g>
      <ellipse cx="388" cy="150" rx="30" ry="34" fill="#0b1024"/>
      <ellipse cx="472" cy="150" rx="30" ry="34" fill="#0b1024"/>
      <circle cx="396" cy="144" r="9" fill="#7dd3fc"/>
      <circle cx="480" cy="144" r="9" fill="#7dd3fc"/>
      <circle cx="392" cy="140" r="3" fill="#fff"/>
      <circle cx="476" cy="140" r="3" fill="#fff"/>
      <!-- blinking lids -->
      <rect class="lid" x="356" y="112" width="64" height="40" rx="18" fill="url(#body)"/>
      <rect class="lid" x="440" y="112" width="64" height="40" rx="18" fill="url(#body)"/>
    </g>
    <!-- smile -->
    <path d="M410 196 q20 18 44 0" fill="none" stroke="#0b1024" stroke-width="4" stroke-linecap="round"/>
    <!-- blush -->
    <ellipse cx="360" cy="188" rx="12" ry="7" fill="#a855f7" opacity="0.5"/>
    <ellipse cx="500" cy="188" rx="12" ry="7" fill="#a855f7" opacity="0.5"/>
  </g>

  <!-- laptop the octopus is coding on -->
  <g transform="translate(300 250)">
    <rect x="0" y="0" width="150" height="20" rx="4" fill="#111a38"/>
    <rect x="14" y="-64" width="122" height="64" rx="6" fill="#0b1230" stroke="#22d3ee" stroke-opacity="0.5"/>
    <g font-family="'Courier New',monospace" font-size="8" fill="#5eead4">
      <text x="22" y="-50" class="cur">&#62;_ building.ai()</text>
      <text x="22" y="-38" fill="#38bdf8">while(learning){</text>
      <text x="30" y="-27" fill="#a855f7">  ship();</text>
      <text x="22" y="-16" fill="#38bdf8">}</text>
    </g>
  </g>

  <!-- floating code particles -->
  <g font-family="'Courier New',monospace" font-weight="bold">
    <text class="p"  x="600" y="120" font-size="22" fill="#22d3ee">&#60;/&#62;</text>
    <text class="p2" x="690" y="180" font-size="18" fill="#a855f7">{ }</text>
    <text class="p3" x="640" y="230" font-size="16" fill="#5eead4">01</text>
    <text class="p2" x="560" y="90"  font-size="14" fill="#38bdf8">def</text>
  </g>

  <!-- name plate -->
  <g transform="translate(620 150)">
    <text x="0" y="0" font-size="46" font-weight="800" fill="#e8fbff" letter-spacing="1">ANZAR SHAIKH</text>
    <text x="2" y="34" font-family="'Courier New',monospace" font-size="18" fill="#7dd3fc">
      AI Engineer<tspan fill="#475569"> · </tspan><tspan fill="#a855f7">GenAI</tspan><tspan fill="#475569"> · </tspan><tspan fill="#5eead4">ML</tspan><tspan class="cur" fill="#22d3ee">_</tspan>
    </text>
    <g class="pulse">
      <rect x="2" y="52" width="120" height="3" rx="2" fill="#22d3ee"/>
      <rect x="128" y="52" width="40" height="3" rx="2" fill="#7c3aed"/>
    </g>
  </g>
</svg>
