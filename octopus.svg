<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 340" width="1100" height="340" font-family="'Segoe UI',system-ui,sans-serif">
<defs>
  <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#e9ecf1"/></linearGradient>
  <radialGradient id="bg" cx="0.36" cy="0.28" r="0.85">
    <stop offset="0" stop-color="#ffffff"/><stop offset="0.42" stop-color="#e4e8ee"/>
    <stop offset="0.78" stop-color="#bcc2ce"/><stop offset="1" stop-color="#9299a9"/></radialGradient>
  <radialGradient id="tb" cx="0.4" cy="0.2" r="0.9">
    <stop offset="0" stop-color="#aeb4c1"/><stop offset="1" stop-color="#7c8394"/></radialGradient>
  <radialGradient id="tm" cx="0.4" cy="0.2" r="0.9">
    <stop offset="0" stop-color="#c2c7d2"/><stop offset="1" stop-color="#9aa1b1"/></radialGradient>
  <radialGradient id="grnd" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#2a2f3a" stop-opacity="0.26"/><stop offset="1" stop-color="#2a2f3a" stop-opacity="0"/></radialGradient>
  <radialGradient id="spec" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
  <style>
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.4px)}}
    @keyframes breathe{0%,100%{transform:scale(1,1)}50%{transform:scale(1.02,0.98)}}
    @keyframes swL{0%,100%{transform:rotate(0)}50%{transform:rotate(2.6deg)}}
    @keyframes swR{0%,100%{transform:rotate(0)}50%{transform:rotate(-2.6deg)}}
    @keyframes swM{0%,100%{transform:rotate(0)}50%{transform:rotate(1.6deg)}}
    @keyframes gshadow{0%,100%{opacity:.85;transform:scaleX(1)}50%{opacity:.55;transform:scaleX(.82)}}
    @keyframes rise{0%{opacity:0;transform:translateY(14px)}30%{opacity:.85}100%{opacity:0;transform:translateY(-26px)}}
    @keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}
    .oct{animation:bob 4.2s ease-in-out infinite;transform-origin:18px 17px}
    .head{animation:breathe 4.2s ease-in-out infinite;transform-origin:18px 12px;transform-box:fill-box}
    .tbL{animation:swL 3.6s ease-in-out infinite;transform-origin:50% 0;transform-box:fill-box}
    .tbR{animation:swR 3.9s ease-in-out infinite;transform-origin:50% 0;transform-box:fill-box}
    .tbM{animation:swM 3.3s ease-in-out infinite;transform-origin:50% 0;transform-box:fill-box}
    .grnd{animation:gshadow 4.2s ease-in-out infinite;transform-origin:855px 262px;transform-box:view-box}
    .p{animation:rise 3.4s ease-in-out infinite} .p2{animation:rise 4.2s ease-in-out infinite 1.1s}
    .p3{animation:rise 3.8s ease-in-out infinite 2.1s} .cur{animation:cur 1.1s steps(1) infinite}
  </style>
</defs>

<rect x="1" y="1" width="1098" height="338" rx="20" fill="url(#card)" stroke="#e0e3e9"/>
<g fill="#c6cbd5"><circle cx="28" cy="26" r="2"/><circle cx="44" cy="26" r="2"/><circle cx="28" cy="42" r="2"/>
  <circle cx="1072" cy="314" r="2"/><circle cx="1056" cy="314" r="2"/><circle cx="1072" cy="298" r="2"/></g>

<ellipse class="grnd" cx="855" cy="262" rx="120" ry="17" fill="url(#grnd)"/>

<g font-family="'Courier New',monospace" font-weight="bold" fill="#9aa1b0">
  <text class="p" x="690" y="96" font-size="20">&#60;/&#62;</text>
  <text class="p2" x="985" y="120" font-size="16">{ }</text>
  <text class="p3" x="975" y="70" font-size="13">def</text>
</g>

<g transform="translate(755,52) scale(5.6)">
  <g class="oct">
    <g class="tbM"><path fill="url(#tm)" d="M30.188 16c-3 5 0 10.692 3 9.692s4 2 1 3-9.465-.465-13-4c-1-1-2-1-2-1l11-7.692zM5.812 16c3 5 0 10.692-3 9.692s-4 2-1 3 9.465-.465 13-4c1-1 2-1 2-1L5.812 16z"/></g>
    <g class="tbL"><path fill="url(#tb)" d="M10 12c3 5 0 10.692-3 9.692s-4 2-1 3 9.465-.465 13-4c1-1 2-1 2-1L10 12z"/></g>
    <g class="tbR"><path fill="url(#tb)" d="M26 12c-3 5 0 10.692 3 9.692s4 2 1 3-9.465-.465-13-4c-1-1-2-1-2-1L26 12z"/></g>
    <g class="head">
      <path fill="url(#bg)" d="M33.188 31.375c-2.729.91-6.425-5.626-4.812-10.578C30.022 17.554 31 13.94 31 11c0-7.18-5.82-11-13-11S5 3.82 5 11c0 2.94.978 6.554 2.624 9.797 1.613 4.952-2.083 11.488-4.812 10.578-3-1-4 3-1 4s8.31-.627 12-4c2.189-2 4.189-2 4.189-2s2 0 4.188 2c3.69 3.373 9 5 12 4s1.999-5-1.001-4z"/>
      <ellipse cx="12.5" cy="6.5" rx="5" ry="3.6" fill="url(#spec)"/>
      <circle fill="#12151b" cx="14" cy="21" r="2.1"/><circle fill="#12151b" cx="22" cy="21" r="2.1"/>
      <circle fill="#ffffff" cx="13.3" cy="20.3" r="0.7"/><circle fill="#ffffff" cx="21.3" cy="20.3" r="0.7"/>
      <path d="M15.6 24.4q2.4 1.8 4.8 0" fill="none" stroke="#12151b" stroke-width="0.7" stroke-linecap="round"/>
    </g>
  </g>
</g>

<g transform="translate(800,268)">
  <rect x="-7" y="13" width="132" height="7" rx="3" fill="#c2c8d2"/>
  <rect x="0" y="0" width="118" height="15" rx="2" fill="#d3d8e0"/>
  <rect x="10" y="-52" width="98" height="52" rx="5" fill="#0e1116"/>
  <g font-family="'Courier New',monospace" font-size="8">
    <text x="18" y="-39" fill="#e9edf2">def build_ai():</text>
    <text x="24" y="-28" fill="#9aa4b2">while learning:</text>
    <text x="30" y="-17" fill="#cfd4dd">ship()<tspan class="cur" fill="#fff">_</tspan></text>
  </g>
</g>

<g transform="translate(64,160)">
  <text x="0" y="0" font-size="46" font-weight="800" fill="#12151b" letter-spacing="1">ANZAR SHAIKH</text>
  <text x="2" y="36" font-family="'Courier New',monospace" font-size="17" fill="#3a4150">
    AI Engineer<tspan fill="#aab0bd"> / </tspan>GenAI<tspan fill="#aab0bd"> / </tspan>Machine Learning<tspan class="cur" fill="#12151b">_</tspan></text>
  <rect x="2" y="54" width="152" height="3" rx="2" fill="#12151b"/><rect x="160" y="54" width="46" height="3" rx="2" fill="#9aa4b2"/>
</g>
</svg>
