  <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#e9ecf1"/></linearGradient>
  <radialGradient id="vol" cx="0.4" cy="0.3" r="0.85">
    <stop offset="0" stop-color="#ffffff"/><stop offset="0.45" stop-color="#dfe3ea"/>
    <stop offset="0.8" stop-color="#b3b9c6"/><stop offset="1" stop-color="#8b92a2"/></radialGradient>
  <radialGradient id="spec" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
  <radialGradient id="grnd" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#2a2f3a" stop-opacity="0.28"/><stop offset="1" stop-color="#2a2f3a" stop-opacity="0"/></radialGradient>
  <style>
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
    @keyframes breathe{0%,100%{transform:scale(1,1)}50%{transform:scale(1.03,0.97)}}
    @keyframes gshadow{0%,100%{opacity:.85;transform:scaleX(1)}50%{opacity:.5;transform:scaleX(.8)}}
    @keyframes blink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(.08)}}
    @keyframes wigA{0%,100%{transform:rotate(0)}50%{transform:rotate(3.5deg)}}
    @keyframes wigB{0%,100%{transform:rotate(0)}50%{transform:rotate(-3.5deg)}}
    @keyframes rise{0%{opacity:0;transform:translateY(14px)}30%{opacity:.85}100%{opacity:0;transform:translateY(-26px)}}
    @keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}
    .oct{animation:bob 4.5s ease-in-out infinite;transform-origin:830px 150px}
    .body{animation:breathe 4.5s ease-in-out infinite;transform-origin:830px 150px;transform-box:view-box}
    .grnd{animation:gshadow 4.5s ease-in-out infinite;transform-origin:830px 355px;transform-box:view-box}
    .leg{transform-box:fill-box;transform-origin:50% 0%}
    .lr0,.ll1{animation:wigA 3.4s ease-in-out infinite}
    .ll0,.lr1{animation:wigB 3.8s ease-in-out infinite}
    .lr2,.ll2{animation:wigA 3.0s ease-in-out infinite .3s}
    .lid{transform-box:fill-box;transform-origin:center;animation:blink 5s ease-in-out infinite}
    .p{animation:rise 3.4s ease-in-out infinite} .p2{animation:rise 4.2s ease-in-out infinite 1.1s}
    .p3{animation:rise 3.8s ease-in-out infinite 2.1s} .cur{animation:cur 1.1s steps(1) infinite}
  </style>
</defs>
